name: Docs Generator CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'projects/docs-generator/**'
  pull_request:
    branches: [main]
    paths:
      - 'projects/docs-generator/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: projects/docs-generator

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: projects/docs-generator/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate Python syntax
        run: python -m py_compile main.py

      - name: Validate all source files compile
        run: python -m compileall src/ -q

      - name: Verify CLI loads
        run: python main.py --help
